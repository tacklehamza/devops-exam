<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Task Manager - FA23-BCS-214</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    header h1 { font-size: 2rem; color: #e94560; }
    header p { color: #aaa; margin-top: 6px; }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #e94560;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
    }
    button {
      padding: 10px 18px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #c73652; }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #0f3460;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .task-item span { font-size: 0.95rem; }
    .delete-btn {
      background: transparent;
      color: #e94560;
      font-size: 1.1rem;
      padding: 4px 8px;
    }
    .status-bar {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #e94560;
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Task Manager</h1>
    <p>DevOps Exam App &mdash; FA23-BCS-214 <span class="badge">Running in Docker</span></p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter a new task..." />
      <button onclick="addTask()">Add</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="status-bar" id="statusBar">Loading...</div>
  </div>

  <script>
    const API = '/api';

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const tasks = await res.json();
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach(t => {
          const li = document.createElement('li');
          li.className = 'task-item';
          li.innerHTML = `<span>${t.title}</span>
            <button class="delete-btn" onclick="deleteTask('${t._id}')">&#x2715;</button>`;
          list.appendChild(li);
        });
        document.getElementById('statusBar').textContent = `${tasks.length} task(s) loaded`;
      } catch (e) {
        document.getElementById('statusBar').textContent = 'DB not connected — running in demo mode';
      }
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      try {
        await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        input.value = '';
        loadTasks();
      } catch (e) {
        alert('Could not add task');
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (e) {
        alert('Could not delete task');
      }
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
